<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Relaciona Conceptos</title>
  <link rel="stylesheet" href="css/estilos.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
  <link rel="stylesheet" href="css/nav.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f5f5f2;
      --bg-tertiary: #eeede8;
      --text-primary: #1a1a18;
      --text-secondary: #666660;
      --border: rgba(0,0,0,0.12);
      --border-hover: rgba(0,0,0,0.25);
      --radius-md: 8px;
      --radius-lg: 12px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg-primary: #1e1e1c;
        --bg-secondary: #2a2a28;
        --bg-tertiary: #333330;
        --text-primary: #f0efe8;
        --text-secondary: #999990;
        --border: rgba(255,255,255,0.12);
        --border-hover: rgba(255,255,255,0.25);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    #app {
      max-width: 780px;
      margin: 0 auto;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: 12px;
    }

    .title {
      font-size: 20px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .title i { font-size: 22px; }

    .controls {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }

    select {
      padding: 7px 12px;
      font-size: 13px;
      font-weight: 500;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: inherit;
      max-width: 260px;
    }

    button {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      font-size: 13px;
      font-weight: 500;
      border: 0.5px solid var(--border-hover);
      border-radius: var(--radius-md);
      background: var(--bg-primary);
      color: var(--text-primary);
      cursor: pointer;
      transition: background .15s, border-color .15s;
      font-family: inherit;
    }

    button:hover { background: var(--bg-secondary); border-color: var(--border-hover); }
    button:active { transform: scale(0.98); }

    .file-btn { position: relative; overflow: hidden; }
    .file-btn input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      font-size: 0;
    }

    .active-file {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-md);
      padding: 5px 12px;
      display: none;
      align-items: center;
      gap: 6px;
      margin-bottom: 1rem;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1.5rem;
    }

    .stat {
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 12px;
      text-align: center;
    }

    .stat-val { font-size: 24px; font-weight: 600; color: var(--text-primary); }
    .stat-lbl { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }

    .board {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .col-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: var(--text-secondary);
      margin-bottom: 8px;
      font-weight: 600;
    }

    .cards-col { display: flex; flex-direction: column; gap: 8px; }

    .card {
      padding: 11px 14px;
      border-radius: var(--radius-md);
      border: 0.5px solid var(--border);
      background: var(--bg-primary);
      cursor: pointer;
      font-size: 14px;
      line-height: 1.45;
      color: var(--text-primary);
      transition: border-color .15s, background .15s, transform .1s;
      user-select: none;
    }

    .card:hover { border-color: var(--border-hover); background: var(--bg-secondary); }
    .card.selected { border-color: #378ADD; background: #E6F1FB; color: #0C447C; }
    .card.matched  { border-color: #3B6D11; background: #EAF3DE; color: #27500A; pointer-events: none; }
    .card.wrong    { border-color: #A32D2D; background: #FCEBEB; color: #791F1F; }

    @media (prefers-color-scheme: dark) {
      .card.selected { background: #042C53; color: #B5D4F4; border-color: #185FA5; }
      .card.matched  { background: #173404; color: #C0DD97; border-color: #3B6D11; }
      .card.wrong    { background: #501313; color: #F7C1C1; border-color: #A32D2D; }
    }

    .message {
      text-align: center;
      padding: 12px;
      border-radius: var(--radius-md);
      margin-bottom: 1rem;
      font-size: 14px;
      font-weight: 500;
      display: none;
    }

    .msg-ok  { background: #EAF3DE; color: #27500A; }
    .msg-err { background: #FCEBEB; color: #791F1F; }
    .msg-win { background: #E6F1FB; color: #0C447C; font-size: 16px; }

    .placeholder {
      text-align: center;
      padding: 2.5rem 1.5rem;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      border: 0.5px dashed var(--border-hover);
      color: var(--text-secondary);
    }

    .placeholder i { font-size: 32px; display: block; margin-bottom: 10px; }
    .placeholder p { font-size: 14px; line-height: 1.6; }
    .placeholder strong { color: var(--text-primary); }

    .format-hint {
      font-size: 12px;
      color: var(--text-secondary);
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-top: 1rem;
      line-height: 1.7;
      border: 0.5px solid var(--border);
    }

    .format-hint strong { color: var(--text-primary); }
    .format-hint code {
      font-family: monospace;
      background: var(--bg-primary);
      border: 0.5px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      font-size: 11px;
    }

    .chooser-panel {
      background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.18), transparent 32rem),
    radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.14), transparent 30rem),
    var(--bg);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 1.5rem;
    }

    .chooser-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .chooser-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--text-primary);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .chooser-subtitle {
      font-size: 12px;
      color: var(--text-secondary);
